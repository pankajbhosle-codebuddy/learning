services:
  app:
    build: .
    ports:
      - "4000:4000"

    depends_on:
      - mongo

    environment:
      MONGO_URI: mongodb://mongo:27017/mydb

    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  mongo:
    image: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
