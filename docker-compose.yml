  services:
    mongo:
      image: mongo:7
      container_name: mongo
      hostname: mongo
      ports:
        - "27017:27017"
      command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
      healthcheck:
        test: >
          mongosh --eval "
          try {
            rs.status()
          } catch (e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'mongo:27017' }]
            })
          }"
        interval: 5s
        timeout: 30s
        retries: 30

    app:
      build: .
      container_name: app
      ports:
        - "4000:4000"
      depends_on:
        mongo:
          condition: service_healthy
      environment:
        DATABASE_URL: mongodb://mongo:27017/test?replicaSet=rs0
      volumes:
        - .:/app
        - /app/node_modules
      command: npm run dev
  volumes:
    mongo-data: